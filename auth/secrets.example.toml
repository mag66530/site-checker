# Шаблон .streamlit/secrets.toml для site-checker.
# Реальные значения — из шагов 1-4 INSTRUCTIONS.md. Файл с настоящими значениями
# в git НЕ класть (.gitignore уже должен игнорить .streamlit/secrets.toml).

[supabase]
# Project Settings → Database → Connection string → Transaction pooler (порт 6543!)
db_url = "postgresql://postgres.xxxxxxxxxxxx:PASSWORD@aws-0-xxxx.pooler.supabase.com:6543/postgres"

[seed_admin]
# Первый админ создаётся автоматически при первом запуске приложения.
email = "your-email@example.com"
password = "стартовый-пароль-смени-после-первого-входа"

[app]
# python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
fernet_key = "результат-команды-выше"
# Адрес деплоя — нужен для формирования ссылки сброса пароля в письме.
base_url = "https://your-site-checker.streamlit.app"

# Опционально — без него просто не будет работать "Забыли пароль?".
[smtp]
host = "smtp.gmail.com"
port = 587
user = "рабочая-почта@gmail.com"
app_password = "app-password-из-google-account-security"
from_name = "Site-Checker"
